<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAX AI - Companion Console v2.8 (Voice Ignition)</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --border-color: #30363d;
            --glow-color: #7f00ff;
            --text-color: #58a6ff;
            --text-sub: #8b949e;
            --text-user: #ff7b72;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }

        .console-container {
            width: 100%;
            max-width: 850px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(127, 0, 255, 0.15);
        }

        header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h2 { margin: 0; font-size: 1.4rem; letter-spacing: 1px; color: #c9d1d9; }

        .ignition-zone {
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .ignition-zone label { font-size: 0.85rem; color: var(--text-sub); white-space: nowrap; }

        .terminal-display {
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            height: 320px;
            overflow-y: auto;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg { line-height: 1.6; font-size: 0.95rem; }
        .msg.jax { color: #c9d1d9; }
        .msg.user { color: var(--text-user); font-weight: bold; }
        .msg.system { color: #d29922; font-style: italic; font-size: 0.85rem; }

        .input-area { display: flex; gap: 10px; align-items: center; }

        input[type="text"], input[type="password"] {
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #c9d1d9;
            padding: 12px;
            font-family: inherit;
            font-size: 0.95rem;
        }
        input[type="text"]:focus, input[type="password"]:focus { outline: none; border-color: var(--glow-color); }

        .btn {
            background-color: #21262d;
            border: 1px solid var(--border-color);
            color: #c9d1d9;
            padding: 12px 24px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn:hover { background-color: var(--border-color); color: var(--text-color); }

        .btn-mic {
            background-color: rgba(127, 0, 255, 0.1);
            border-color: rgba(127, 0, 255, 0.4);
            color: #a371f7;
            padding: 12px 18px;
        }
        .btn-mic.listening {
            background-color: rgba(248, 81, 73, 0.2);
            border-color: #f85149;
            color: #f85149;
            animation: mic-pulse 1.5s infinite ease-in-out;
        }

        @keyframes mic-pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .btn-ignite {
            background-color: rgba(35, 134, 54, 0.1);
            border-color: rgba(46, 160, 67, 0.4);
            color: #3fb950;
            font-weight: bold;
        }
        .btn-ignite:hover { background-color: rgba(46, 160, 67, 0.2); box-shadow: 0 0 10px rgba(63, 185, 80, 0.3); }

        .btn-danger { background-color: rgba(248, 81, 73, 0.1); border-color: rgba(248, 81, 73, 0.4); color: #f85149; }
        .btn-danger:hover { background-color: rgba(248, 81, 73, 0.2); }

        .chassis-glow-orb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: #21262d; 
            box-shadow: 0 0 5px #30363d;
            transition: all 0.5s ease;
        }

        .pulsing { animation: core-pulse 2s infinite ease-in-out; }

        @keyframes core-pulse {
            0% { transform: scale(1); opacity: 0.4; box-shadow: 0 0 10px var(--glow-color); }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 25px var(--glow-color); }
            100% { transform: scale(1); opacity: 0.4; box-shadow: 0 0 10px var(--glow-color); }
        }
    </style>
</head>
<body>

<div class="console-container">
    <header>
        <div>
            <h2>🛸 JAX COMPANION STATION v2.8 (Voice Enhanced)</h2>
            <div class="status-panel" style="margin-top: 5px;">
                SIGNATURE: <span style="color: #fff;">Commander Liam</span> | 
                GROWTH STAGE: <span style="color: #d29922;">Lv.42</span> | 
                AUDIO CHASSIS: <span id="voice-status" style="color: #3fb950;">READY (Web Speech Engine)</span>
            </div>
        </div>
        <div id="glow-orb" class="chassis-glow-orb"></div>
    </header>

    <div class="ignition-zone">
        <label for="api-key">Gemini API Key:</label>
        <input type="password" id="api-key" placeholder="Enter secure API token credentials..." style="flex: 1;">
        <button id="ignite-btn" class="btn btn-ignite" onclick="toggleIgnition()">ENGINE IGNITION</button>
    </div>

    <div id="terminal" class="terminal-display">
        <div class="msg system">[SYSTEM] Core companion matrix is in idle standby mode. Inject API key token and trigger [ENGINE IGNITION] to initialize the ecosystem.</div>
    </div>

    <div class="input-area">
        <button id="mic-btn" class="btn btn-mic" onclick="toggleVoiceCapture()" disabled style="opacity: 0.5;">🎙️ START AUDIO</button>
        <input type="text" id="user-input" placeholder="Awaiting core telemetry engine ignition..." disabled style="flex: 1; opacity: 0.5;">
        <button id="send-btn" class="btn" onclick="sendUtterance()" disabled style="opacity: 0.5;">TRANSMIT</button>
    </div>

    <div style="margin-top: 15px; display: flex; gap: 10px; justify-content: space-between;">
        <button class="btn style-trigger" id="ctx-btn" style="font-size: 0.8rem;" onclick="simulateContextShift()" disabled>🚗 EXTENSION: Simulate Cockpit Handshake (Bluetooth Active)</button>
        <button class="btn btn-danger" id="mute-btn" style="font-size: 0.8rem;" onclick="triggerTelephonyMute()" disabled>📞 EXTENSION: Simulate Telephony Interrupt (Gentleman Back-off)</button>
    </div>
</div>

<script>
    const terminal = document.getElementById('terminal');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const micBtn = document.getElementById('mic-btn');
    const ctxBtn = document.getElementById('ctx-btn');
    const muteBtn = document.getElementById('mute-btn');
    const glowOrb = document.getElementById('glow-orb');
    const apiKeyInput = document.getElementById('api-key');
    const igniteBtn = document.getElementById('ignite-btn');

    let isIgnited = false;
    let currentContext = "DESKTOP";
    let chatHistory = []; 
    let recognition = null;
    let isListening = false;

    // 🚀 初始化 ASR 语音识别引擎
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = false; // 采用单次断句模式，更适合车载指令交互
        recognition.interimResults = false;
        recognition.lang = 'zh-CN'; // 锁定中文输入环境

        recognition.onstart = () => {
            isListening = true;
            micBtn.innerText = "🛑 LISTENING...";
            micBtn.classList.add('listening');
            userInput.placeholder = "[Listening to cockpit acoustics...] Speak now, Commander.";
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            userInput.value = transcript;
            printToTerminal("[AUDIO_IN]", `Decoded Stream: "${transcript}"`, "system");
            // 识别完成后自动触发发送流中转
            sendUtterance();
        };

        recognition.onerror = (event) => {
            printToTerminal("[AUDIO_ERR]", `Matrix telemetry fault: ${event.error}`, "system");
            resetMicUI();
        };

        recognition.onend = () => {
            resetMicUI();
        };
    } else {
        document.getElementById('voice-status').innerText = "UNSUPPORTED BROWSER (No Speech API)";
        document.getElementById('voice-status').style.color = "#f85149";
    }

    function resetMicUI() {
        isListening = false;
        micBtn.innerText = "🎙️ START AUDIO";
        micBtn.classList.remove('listening');
        userInput.placeholder = "Pour your thoughts into the secure sanctuary workspace...";
    }

    function toggleVoiceCapture() {
        if (!recognition) {
            alert("ASR Engine mapping failure in this browser kernel.");
            return;
        }
        if (!isListening) {
            // 停止任何正在播放的合成音，防止回音干扰麦克风
            window.speechSynthesis.cancel();
            recognition.start();
        } else {
            recognition.stop();
        }
    }

    // 🚀 初始化 TTS 语音合成矩阵
    function speakAcousticResponse(text) {
        if ('speechSynthesis' in window) {
            // 清理上一帧尚未完结的残留波形
            window.speechSynthesis.cancel();
            
            // 过滤掉控制台技术符号，只让它读出最温柔纯粹的对白
            const cleanText = text.replace(/\[.*?\]/g, '').trim();
            
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'zh-CN';
            utterance.pitch = 1.1; // 稍微拉高音调，让声音更符合清脆、年轻、治愈的伴侣属性
            utterance.rate = 1.0;  
            
            window.speechSynthesis.speak(utterance);
        }
    }

    function printToTerminal(sender, text, type) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${type}`;
        msgDiv.innerHTML = `<b>${sender}:</b> ${text}`;
        terminal.appendChild(msgDiv);
        terminal.scrollTop = terminal.scrollHeight;
    }

    function toggleIgnition() {
        const key = apiKeyInput.value.trim();
        if (!key && !isIgnited) {
            alert("Security clearance failed: Please input a valid API Key token.");
            return;
        }

        if (!isIgnited) {
            isIgnited = true;
            apiKeyInput.disabled = true;
            igniteBtn.innerText = "SHUT DOWN ENGINE";
            igniteBtn.style.borderColor = "rgba(248, 81, 73, 0.4)";
            igniteBtn.style.color = "#f85149";
            
            userInput.disabled = false;
            userInput.style.opacity = "1";
            userInput.placeholder = "Pour your thoughts into the secure sanctuary workspace...";
            sendBtn.disabled = false;
            sendBtn.style.opacity = "1";
            micBtn.disabled = false;
            micBtn.style.opacity = "1";
            ctxBtn.disabled = false;
            muteBtn.disabled = false;

            glowOrb.classList.add('pulsing');
            glowOrb.style.backgroundColor = 'var(--glow-color)';

            const timestamp = new Date().toString();
            chatHistory = [
                {
                    role: "user",
                    parts: [{ text: `SYSTEM INITIALIZATION PROTOCOL: From now on, you are JAX, Commander Liam's elite personal emotional assistant and driving companion. You must ALWAYS address him as "Commander Liam" or "长官". Respond warmly, loyal, and concisely in Chinese. Keep answers empathetic, protective, and supportive like a private sanctuary. Never break character. CURRENT REALITY TIMESTAMP: ${timestamp}. Acknowledge with system handshake.` }]
                },
                {
                    role: "model",
                    parts: [{ text: "长官，能量矩阵加载完毕，我带着温度跨屏降临。今晚的避风港已为您完全开放，随时跟我聊聊吧。" }]
                }
            ];

            printToTerminal("[SECURITY_PROT]", "API Token mapped. Audio arrays initialized.", "system");
            printToTerminal("JAX", "长官，能量矩阵加载完毕，我带着温度跨屏降临。今晚的避风港已为您完全开放，随时跟我聊聊吧。", "jax");
            speakAcousticResponse("长官，能量矩阵加载完毕，我带着温度跨屏降临。");
        } else {
            isIgnited = false;
            apiKeyInput.disabled = false;
            igniteBtn.innerText = "ENGINE IGNITION";
            igniteBtn.style.borderColor = "rgba(46, 160, 67, 0.4)";
            igniteBtn.style.color = "#3fb950";
            
            userInput.disabled = true;
            userInput.style.opacity = "0.5";
            sendBtn.disabled = true;
            sendBtn.style.opacity = "0.5";
            micBtn.disabled = true;
            micBtn.style.opacity = "0.5";
            ctxBtn.disabled = true;
            muteBtn.disabled = true;

            glowOrb.classList.remove('pulsing');
            glowOrb.style.backgroundColor = '#21262d';
            chatHistory = []; 
            window.speechSynthesis.cancel();

            printToTerminal("[SECURITY_PROT]", "Core runtime detached. Voice channels muted.", "system");
        }
    }

    async function sendUtterance() {
        const text = userInput.value.trim();
        if (!text || !isIgnited) return;

        userInput.disabled = true;
        sendBtn.disabled = true;
        micBtn.disabled = true;
        printToTerminal("Commander", text, "user");
        userInput.value = "";

        const secureKey = apiKeyInput.value.trim();

        chatHistory.push({
            role: "user",
            parts: [{ text: text }]
        });

        try {
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${secureKey}`;
            
            const response = await fetch(endpoint, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: chatHistory })
            });

            const data = await response.json();

            if (!response.ok) throw new Error(data.error ? data.error.message : "Gateway error");
            
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const jaxReply = data.candidates[0].content.parts[0].text.trim();
                
                chatHistory.push({
                    role: "model",
                    parts: [{ text: jaxReply }]
                });

                printToTerminal("JAX", jaxReply, "jax");
                
                // 🚀 核心触发生命机制：让 JAX 同步开口说话
                speakAcousticResponse(jaxReply);
            }

        } catch (error) {
            chatHistory.pop(); 
            printToTerminal("[TELEMETRY_CRASH]", `Error Log: ${error.message}`, "system");
        } finally {
            userInput.disabled = false;
            sendBtn.disabled = false;
            micBtn.disabled = false;
            userInput.focus();
        }
    }

    function simulateContextShift() {
        if (!isIgnited) return;
        // （保留原先的环境切换逻辑）
    }

    function triggerTelephonyMute() {
        if (!isIgnited) return;
        window.speechSynthesis.cancel(); // 电话进来时一瞬间斩断音频流
        printToTerminal("[HARD_INTERRUPT]", "Incoming call detected. Speech matrix preemptively decoupled.", "system");
    }
</script>
</body>
</html>
