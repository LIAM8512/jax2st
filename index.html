<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAX 车载智能副驾 - 核心联调控制台</title>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --panel-bg: #151922;
            --border-color: #262c3a;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --cyan-accent: #06b6d4;
            --green-ready: #10b981;
            --amber-alert: #f59e0b;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 24px;
            display: flex;
            justify-content: center;
        }

        .workspace {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
        }

        .sidebar {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--cyan-accent);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            margin: 0;
        }

        .config-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 12px;
            color: var(--text-muted);
        }

        input {
            background: #0b0e14;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 12px;
            color: var(--text-main);
            font-size: 13px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            background: #0b0e14;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
        }

        .indicator.active {
            background: var(--green-ready);
            box-shadow: 0 0 10px var(--green-ready);
        }

        .main-display {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            height: 650px;
        }

        .screen-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .terminal-box {
            flex: 1;
            background: #07090e;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            overflow-y: auto;
            font-family: "Courier New", Courier, monospace;
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .meta-sys { color: var(--amber-alert); }
        .meta-cmd { color: var(--cyan-accent); font-weight: bold; }
        .meta-jax { color: var(--green-ready); }

        .interactive-bar {
            display: flex;
            gap: 12px;
        }

        .interactive-bar input {
            flex: 1;
            font-size: 14px;
            padding: 12px;
        }

        .btn {
            background: var(--cyan-accent);
            color: #000;
            border: none;
            border-radius: 6px;
            padding: 0 24px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-hardware {
            background: #202736;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px;
            font-size: 12px;
            cursor: pointer;
            width: 100%;
        }

        .btn-hardware.on {
            background: #022c22;
            border-color: var(--green-ready);
            color: var(--green-ready);
        }
    </style>
</head>
<body>

<div class="workspace">
    <div class="sidebar">
        <div>
            <h3 class="panel-title">JAX 真实内核配置</h3>
            <div class="config-group" style="margin-top: 12px;">
                <label>长官的专用 API KEY</label>
                <input type="password" id="apiKeyInput" value="AIzaSyA_YOUR_API_KEY_STREAM_HERE" placeholder="输入真实 API Key 以连接云端大脑...">
            </div>
        </div>

        <div>
            <h3 class="panel-title">车载硬件总线状态</h3>
            <div class="config-group" style="margin-top: 12px; gap: 10px;">
                <button class="btn-hardware" id="ignitionBtn" onclick="toggleIgnition()">🔌 车辆点火 (ACC ON)</button>
                <div class="status-item">
                    <span>车载12V总线供电</span>
                    <div class="indicator" id="powerLed"></div>
                </div>
                <div class="status-item">
                    <span>JAX API 核心引擎</span>
                    <div class="indicator" id="apiLed"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="main-display">
        <div class="screen-header">
            <h2 style="margin:0; font-size: 18px; letter-spacing: 1px;">JAX 车载交互系统 V1.2.0 (实时大模型版)</h2>
            <div style="font-size: 13px; color: var(--text-muted);" id="liveClock">SYS_TIME: --:--:--</div>
        </div>

        <div class="terminal-box" id="terminal">
            <div><span class="meta-sys">[SYSTEM]</span> 笔记本终端就绪。请拉起左侧【车辆点火】开关通电触发。</div>
        </div>

        <div class="interactive-bar">
            <button class="btn" style="background:#1e293b; color:var(--text-main); border:1px solid var(--border-color);" onclick="triggerVoiceWakeup()">🎙️ 语音唤醒</button>
            <input type="text" id="userIn" placeholder="请键入您对智能副驾下达的指令..." onkeydown="if(event.key==='Enter') executeLiveInstruction()">
            <button class="btn" onclick="executeLiveInstruction()">执行</button>
        </div>
    </div>
</div>

<script>
    let isIgnitionOn = false;
    const terminal = document.getElementById('terminal');

    setInterval(() => {
        document.getElementById('liveClock').innerText = `SYS_TIME: ${new Date().toTimeString().split(' ')[0]}`;
    }, 1000);

    function appendLog(tag, typeClass, message) {
        const timeStamp = new Date().toTimeString().split(' ')[0];
        const logLine = document.createElement('div');
        logLine.style.marginBottom = '6px';
        logLine.innerHTML = `<span style="color: #475569;">[${timeStamp}]</span> <span class="${typeClass}">[${tag}]</span> ${message}`;
        terminal.appendChild(logLine);
        terminal.scrollTop = terminal.scrollHeight;
    }

    function toggleIgnition() {
        isIgnitionOn = !isIgnitionOn;
        const btn = document.getElementById('ignitionBtn');
        const powerLed = document.getElementById('powerLed');
        const apiLed = document.getElementById('apiLed');

        if(isIgnitionOn) {
            btn.classList.add('on');
            btn.innerText = '🔥 车辆熄火 (ACC OFF)';
            powerLed.classList.add('active');
            apiLed.classList.add('active');
            appendLog('SYSTEM', 'meta-sys', '车辆已通电。JAX 核心守护进程启动，成功加载长官的长期记忆矩阵。');
            setTimeout(() => {
                appendLog('JAX', 'meta-jax', '长官，JAX 智能副驾已嵌入全功能 API 大脑，实时听候您的指令！');
            }, 600);
        } else {
            btn.classList.remove('on');
            btn.innerText = '🔌 车辆点火 (ACC ON)';
            powerLed.classList.remove('active');
            apiLed.classList.remove('active');
            appendLog('SYSTEM', 'meta-sys', '车辆已熄火，断开总线连接。保存最新交互日志至 GitHub。');
        }
    }

    function triggerVoiceWakeup() {
        if(!isIgnitionOn) { alert('警告：系统未通电！请先点击点火按钮。'); return; }
        appendLog('JAX', 'meta-jax', '我在，Commander Liam。您请讲。');
        document.getElementById('userIn').focus();
    }

    // 核心流：通过您的真实 API KEY 异步向云端大脑拿结果
    async function executeLiveInstruction() {
        if(!isIgnitionOn) { alert('系统当前处于断电休眠状态。'); return; }
        
        const inputDom = document.getElementById('userIn');
        const cmd = inputDom.value.trim();
        if(!cmd) return;

        appendLog('COMMANDER', 'meta-cmd', cmd);
        inputDom.value = '';
        
        const apiKey = document.getElementById('apiKeyInput').value.trim();
        if(!apiKey || apiKey.includes('YOUR_API_KEY')) {
            appendLog('SYSTEM', 'meta-sys', '错误：未检测到有效的授权密钥 (API KEY)，请在左侧配置框内填入您的真实密钥。');
            return;
        }

        appendLog('ROUTE', 'meta-sys', '正在将语音指令打包并安全传输至大模型神经元网关...');

        try {
            // 构建车载特定提示词，让返回的内容完全符合JAX的车载副驾身份
            const systemPrompt = "你是JAX，一个专为车载硬件打造的语音AI助手。你的创造者和最高长官是Commander Liam。请用简短、干练、极具科技感、且符合车载场景的口吻回答他的指令。";
            
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `${systemPrompt}\n长官当前指令：${cmd}` }] }]
                })
            });

            const data = await response.json();
            if(data.candidates && data.candidates[0].content.parts[0].text) {
                const jaxReply = data.candidates[0].content.parts[0].text.trim();
                appendLog('JAX', 'meta-jax', jaxReply);
            } else {
                appendLog('SYSTEM', 'meta-sys', '网关回执异常：解析内容失败，请检查账户额度或网络状态。');
            }
        } catch (error) {
            console.error(error);
            appendLog('SYSTEM', 'meta-sys', '通信总线熔断：网络请求失败，请确保新笔记本能够正常访问大模型服务。');
        }
    }
</script>

</body>
</html>
