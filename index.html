<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAX 车载智能副驾 - 2026全网联调版</title>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --panel-bg: #151922;
            --border-color: #262c3a;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --cyan-accent: #06b6d4;
            --green-ready: #10b981;
            --amber-alert: #f59e0b;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 24px;
            display: flex;
            justify-content: center;
        }

        .workspace {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
        }

        .sidebar {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--cyan-accent);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            margin: 0;
        }

        .config-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 12px;
            color: var(--text-muted);
        }

        input {
            background: #0b0e14;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 12px;
            color: var(--text-main);
            font-size: 13px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            background: #0b0e14;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
        }

        .indicator.active {
            background: var(--green-ready);
            box-shadow: 0 0 10px var(--green-ready);
        }

        .main-display {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            height: 650px;
        }

        .screen-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .terminal-box {
            flex: 1;
            background: #07090e;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            overflow-y: auto;
            font-family: "Courier New", Courier, monospace;
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .meta-sys { color: var(--amber-alert); }
        .meta-cmd { color: var(--cyan-accent); font-weight: bold; }
        .meta-jax { color: var(--green-ready); }

        .interactive-bar {
            display: flex;
            gap: 12px;
        }

        .interactive-bar input {
            flex: 1;
            font-size: 14px;
            padding: 12px;
        }

        .btn {
            background: var(--cyan-accent);
            color: #000;
            border: none;
            border-radius: 6px;
            padding: 0 24px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-hardware {
            background: #202736;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px;
            font-size: 12px;
            cursor: pointer;
            width: 100%;
        }

        .btn-hardware.on {
            background: #022c22;
            border-color: var(--green-ready);
            color: var(--green-ready);
        }
    </style>
</head>
<body>

<div class="workspace">
    <div class="sidebar">
        <div>
            <h3 class="panel-title">JAX 内核校准面板</h3>
            <div class="config-group" style="margin-top: 12px;">
                <label>长官的专用 API KEY</label>
                <input type="password" id="apiKeyInput" value="" placeholder="直接在此输入以 AQ 开头的密钥...">
            </div>
        </div>

        <div>
            <h3 class="panel-title">车载硬件总线状态</h3>
            <div class="config-group" style="margin-top: 12px; gap: 10px;">
                <button class="btn-hardware" id="ignitionBtn" onclick="toggleIgnition()">🔌 车辆点火 (ACC ON)</button>
                <div class="status-item">
                    <span>车载12V总线供电</span>
                    <div class="indicator" id="powerLed"></div>
                </div>
                <div class="status-item">
                    <span>JAX API 核心引擎</span>
                    <div class="indicator" id="apiLed"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="main-display">
        <div class="screen-header">
            <h2 style="margin:0; font-size: 18px; letter-spacing: 1px;">JAX 车载交互系统 V2.0 (网络优化版)</h2>
            <div style="font-size: 13px; color: var(--text-muted);" id="liveClock">SYS_TIME: --:--:--</div>
        </div>

        <div class="terminal-box" id="terminal">
            <div><span class="meta-sys">[SYSTEM]</span> 终端就绪。代码库已升级为 2026 稳定版接口。请点击【车辆点火】。</div>
        </div>

        <div class="interactive-bar">
            <button class="btn" style="background:#1e293b; color:var(--text-main); border:1px solid var(--border-color);" onclick="triggerVoiceWakeup()">🎙️ 语音唤醒</button>
            <input type="text" id="userIn" placeholder="请键入您对智能副驾下达的指令..." onkeydown="if(event.key==='Enter') executeLiveInstruction()">
            <button class="btn" onclick="executeLiveInstruction()">执行</button>
        </div>
    </div>
</div>

<script>
    let isIgnitionOn = false;
    const terminal = document.getElementById('terminal');

    setInterval(() => {
        document.getElementById('liveClock').innerText = `SYS_TIME: ${new Date().toTimeString().split(' ')[0]}`;
    }, 1000);

    function appendLog(tag, typeClass, message) {
        const timeStamp = new Date().toTimeString().split(' ')[0];
        const logLine = document.createElement('div');
        logLine.style.marginBottom = '6px';
        logLine.innerHTML = `<span style="color: #475569;">[${timeStamp}]</span> <span class="${typeClass}">[${tag}]</span> ${message}`;
        terminal.appendChild(logLine);
        terminal.scrollTop = terminal.scrollHeight;
    }

    function toggleIgnition() {
        isIgnitionOn = !isIgnitionOn;
        const btn = document.getElementById('ignitionBtn');
        const powerLed = document.getElementById('powerLed');
        const apiLed = document.getElementById('apiLed');

        if(isIgnitionOn) {
            btn.classList.add('on');
            btn.innerText = '🔥 车辆熄火 (ACC OFF)';
            powerLed.classList.add('active');
            apiLed.classList.add('active');
            appendLog('SYSTEM', 'meta-sys', '车辆已通电。JAX 核心守护进程成功加载。');
        } else {
            btn.classList.remove('on');
            btn.innerText = '🔌 车辆点火 (ACC ON)';
            powerLed.classList.remove('active');
            apiLed.classList.remove('active');
            appendLog('SYSTEM', 'meta-sys', '车辆已熄火，断开总线连接。');
        }
    }

    function triggerVoiceWakeup() {
        if(!isIgnitionOn) { alert('警告：系统未通电！请先点击点火按钮。'); return; }
        appendLog('JAX', 'meta-jax', '我在，Commander Liam。您请讲。');
        document.getElementById('userIn').focus();
    }

    async function executeLiveInstruction() {
        if(!isIgnitionOn) { alert('系统当前处于断电休眠状态。'); return; }
        
        const inputDom = document.getElementById('userIn');
        const cmd = inputDom.value.trim();
        if(!cmd) return;

        appendLog('COMMANDER', 'meta-cmd', cmd);
        inputDom.value = '';
        
        const apiKey = document.getElementById('apiKeyInput').value.trim();
        if(!apiKey) {
            appendLog('SYSTEM', 'meta-sys', '错误：请在左侧配置框内填入您的真实密钥。');
            return;
        }

        appendLog('ROUTE', 'meta-sys', '正在通过全新 v1 稳定通道连接云端大脑...');

        try {
            const systemPrompt = "你是JAX，一个专为车载硬件打造的语音AI助手。你的创造者和最高长官是Commander Liam。请用简短、干练、极具科技感、且符合车载场景的口吻回答他的指令。";
            
            // 🔥 【2026核心修复】：将接口完全切换为 v1 稳定版本，并更换为目前兼容性最强的模型名称格式
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `${systemPrompt}\n长官当前指令：${cmd}` }] }]
                })
            });

            if (!response.ok) {
                // 如果依然返回非200状态，直接在终端把错误详情解析出来，防止瞎猜
                const errData = await response.json().catch(() => ({}));
                const errMsg = errData.error ? errData.error.message : `HTTP状态码 ${response.status}`;
                appendLog('SYSTEM', 'meta-sys', `网关拒绝请求: ${errMsg}`);
                return;
            }

            const data = await response.json();
            if(data.candidates && data.candidates[0].content.parts[0].text) {
                const jaxReply = data.candidates[0].content.parts[0].text.trim();
                appendLog('JAX', 'meta-jax', jaxReply);
            } else {
                appendLog('SYSTEM', 'meta-sys', '回执内容解析失败，接口数据格式有轻微变动。');
            }
        } catch (error) {
            console.error(error);
            appendLog('SYSTEM', 'meta-sys', '通信失败，请检查网络是否能正常穿墙访问大模型。');
        }
    }
</script>

</body>
</html>
