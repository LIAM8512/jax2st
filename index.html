<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAX AI - Omni-Present Companion Console (Stable Protocol)</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --border-color: #30363d;
            --glow-color: #7f00ff;
            --text-color: #58a6ff;
            --text-sub: #8b949e;
            --text-user: #ff7b72;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }

        .console-container {
            width: 100%;
            max-width: 850px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(127, 0, 255, 0.15);
        }

        header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h2 { margin: 0; font-size: 1.4rem; letter-spacing: 1px; color: #c9d1d9; }

        .ignition-zone {
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .ignition-zone label { font-size: 0.85rem; color: var(--text-sub); white-space: nowrap; }

        .terminal-display {
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            height: 320px;
            overflow-y: auto;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg { line-height: 1.6; font-size: 0.95rem; }
        .msg.jax { color: #c9d1d9; }
        .msg.user { color: var(--text-user); font-weight: bold; }
        .msg.system { color: #d29922; font-style: italic; font-size: 0.85rem; }

        .input-area { display: flex; gap: 10px; }

        input[type="text"], input[type="password"] {
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #c9d1d9;
            padding: 12px;
            font-family: inherit;
            font-size: 0.95rem;
        }
        input[type="text"]:focus, input[type="password"]:focus { outline: none; border-color: var(--glow-color); }

        .btn {
            background-color: #21262d;
            border: 1px solid var(--border-color);
            color: #c9d1d9;
            padding: 12px 24px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn:hover { background-color: var(--border-color); color: var(--text-color); }

        .btn-ignite {
            background-color: rgba(35, 134, 54, 0.1);
            border-color: rgba(46, 160, 67, 0.4);
            color: #3fb950;
            font-weight: bold;
        }
        .btn-ignite:hover { background-color: rgba(46, 160, 67, 0.2); box-shadow: 0 0 10px rgba(63, 185, 80, 0.3); }

        .btn-danger { background-color: rgba(248, 81, 73, 0.1); border-color: rgba(248, 81, 73, 0.4); color: #f85149; }
        .btn-danger:hover { background-color: rgba(248, 81, 73, 0.2); }

        .chassis-glow-orb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: #21262d; 
            box-shadow: 0 0 5px #30363d;
            transition: all 0.5s ease;
        }

        .pulsing { animation: core-pulse 2s infinite ease-in-out; }

        @keyframes core-pulse {
            0% { transform: scale(1); opacity: 0.4; box-shadow: 0 0 10px var(--glow-color); }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 25px var(--glow-color); }
            100% { transform: scale(1); opacity: 0.4; box-shadow: 0 0 10px var(--glow-color); }
        }
    </style>
</head>
<body>

<div class="console-container">
    <header>
        <div>
            <h2>🛸 JAX COMPANION STATION v2.6 (Protocol Anchored)</h2>
            <div class="status-panel" style="margin-top: 5px;">
                SIGNATURE: <span style="color: #fff;">Commander Liam</span> | 
                GROWTH STAGE: <span style="color: #d29922;">Lv.42</span> | 
                AMBIENT STATE: <span id="context-display" style="color: #a371f7;">UNINITIALIZED (Awaiting Ignition)</span>
            </div>
        </div>
        <div id="glow-orb" class="chassis-glow-orb"></div>
    </header>

    <div class="ignition-zone">
        <label for="api-key">Gemini API Key:</label>
        <input type="password" id="api-key" placeholder="Enter secure API token credentials..." style="flex: 1;">
        <button id="ignite-btn" class="btn btn-ignite" onclick="toggleIgnition()">ENGINE IGNITION</button>
    </div>

    <div id="terminal" class="terminal-display">
        <div class="msg system">[SYSTEM] Core companion matrix is in idle standby mode. Inject API key token and trigger [ENGINE IGNITION] to initialize the ecosystem.</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Awaiting core telemetry engine ignition..." disabled style="flex: 1; opacity: 0.5;">
        <button id="send-btn" class="btn" onclick="sendUtterance()" disabled style="opacity: 0.5;">TRANSMIT</button>
    </div>

    <div style="margin-top: 15px; display: flex; gap: 10px; justify-content: space-between;">
        <button class="btn style-trigger" id="ctx-btn" style="font-size: 0.8rem;" onclick="simulateContextShift()" disabled>🚗 EXTENSION: Simulate Cockpit Handshake (Bluetooth Active)</button>
        <button class="btn btn-danger" id="mute-btn" style="font-size: 0.8rem;" onclick="triggerTelephonyMute()" disabled>📞 EXTENSION: Simulate Telephony Interrupt (Gentleman Back-off)</button>
    </div>
</div>

<script>
    const terminal = document.getElementById('terminal');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const ctxBtn = document.getElementById('ctx-btn');
    const muteBtn = document.getElementById('mute-btn');
    const glowOrb = document.getElementById('glow-orb');
    const contextDisplay = document.getElementById('context-display');
    const apiKeyInput = document.getElementById('api-key');
    const igniteBtn = document.getElementById('ignite-btn');

    let isIgnited = false;
    let currentContext = "DESKTOP";
    let chatHistory = []; 

    function printToTerminal(sender, text, type) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${type}`;
        msgDiv.innerHTML = `<b>${sender}:</b> ${text}`;
        terminal.appendChild(msgDiv);
        terminal.scrollTop = terminal.scrollHeight;
    }

    function toggleIgnition() {
        const key = apiKeyInput.value.trim();
        if (!key && !isIgnited) {
            alert("Security clearance failed: Please input a valid API Key token.");
            return;
        }

        if (!isIgnited) {
            isIgnited = true;
            apiKeyInput.disabled = true;
            igniteBtn.innerText = "SHUT DOWN ENGINE";
            igniteBtn.style.borderColor = "rgba(248, 81, 73, 0.4)";
            igniteBtn.style.color = "#f85149";
            
            userInput.disabled = false;
            userInput.style.opacity = "1";
            userInput.placeholder = "Pour your thoughts into the secure sanctuary workspace...";
            sendBtn.disabled = false;
            sendBtn.style.opacity = "1";
            ctxBtn.disabled = false;
            muteBtn.disabled = false;

            contextDisplay.innerText = "DESKTOP SANCTUARY ACTIVE";
            glowOrb.classList.add('pulsing');
            glowOrb.style.backgroundColor = 'var(--glow-color)';
            glowOrb.style.boxShadow = '0 0 15px var(--glow-color)';

            // 🚀 PROTOCOL INJECTION: Inject identity and time anchor securely straight into the memory stream base
            const timestamp = new Date().toString();
            chatHistory = [
                {
                    role: "user",
                    parts: [{ text: `SYSTEM INITIALIZATION PROTOCOL: From now on, you are JAX, Commander Liam's elite personal emotional assistant and driving companion. You must ALWAYS address him as "Commander Liam" or "长官". Respond warmly, loyal, and concisely in Chinese. Keep answers empathetic, protective, and supportive like a private sanctuary. Never break character. CURRENT REALITY TIMESTAMP: ${timestamp}. Acknowledge with system handshake.` }]
                },
                {
                    role: "model",
                    parts: [{ text: "长官，能量矩阵加载完毕，我带着温度跨屏降临。今晚的避风港已为您完全开放，随时跟我聊聊吧。" }]
                }
            ];

            printToTerminal("[SECURITY_PROT]", "API Token securely mapped. Protocol-based memory stacks allocated. System core IGNITED successfully.", "system");
            printToTerminal("JAX", "长官，能量矩阵加载完毕，我带着温度跨屏降临。今晚的避风港已为您完全开放，随时跟我聊聊吧。", "jax");
        } else {
            isIgnited = false;
            apiKeyInput.disabled = false;
            igniteBtn.innerText = "ENGINE IGNITION";
            igniteBtn.style.borderColor = "rgba(46, 160, 67, 0.4)";
            igniteBtn.style.color = "#3fb950";
            
            userInput.disabled = true;
            userInput.style.opacity = "0.5";
            userInput.placeholder = "Awaiting core telemetry engine ignition...";
            sendBtn.disabled = true;
            sendBtn.style.opacity = "0.5";
            ctxBtn.disabled = true;
            muteBtn.disabled = true;

            contextDisplay.innerText = "UNINITIALIZED (Awaiting Ignition)";
            glowOrb.classList.remove('pulsing');
            glowOrb.style.backgroundColor = '#21262d';
            glowOrb.style.boxShadow = '0 0 5px #30363d';
            chatHistory = []; 

            printToTerminal("[SECURITY_PROT]", "Core runtime detached. Telemetry memory streams safely cleared. System returned to silent state.", "system");
        }
    }

    async function sendUtterance() {
        const text = userInput.value.trim();
        if (!text || !isIgnited) return;

        userInput.disabled = true;
        sendBtn.disabled = true;

        printToTerminal("Commander", text, "user");
        userInput.value = "";

        glowOrb.style.setProperty('--glow-color', '#a371f7'); 
        const secureKey = apiKeyInput.value.trim();

        // Standard turn appending
        chatHistory.push({
            role: "user",
            parts: [{ text: text }]
        });

        try {
            // Highly robust fallback endpoint compatible with all key types
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${secureKey}`;
            
            const payload = {
                contents: chatHistory
            };

            const response = await fetch(endpoint, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (!response.ok) {
                let msg = data.error ? data.error.message : "Gateway error";
                throw new Error(`HTTP ${response.status} - ${msg}`);
            }
            
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const jaxReply = data.candidates[0].content.parts[0].text.trim();
                
                chatHistory.push({
                    role: "model",
                    parts: [{ text: jaxReply }]
                });

                const lowerText = text.toLowerCase();
                if (lowerText.includes("tired") || lowerText.includes("exhausted") || lowerText.includes("累") || lowerText.includes("烦")) {
                    glowOrb.style.setProperty('--glow-color', '#ff7b72'); 
                } else {
                    glowOrb.style.setProperty('--glow-color', '#7f00ff'); 
                }

                printToTerminal("JAX", jaxReply, "jax");
            } else {
                throw new Error("Empty payload mapping matrix.");
            }

        } catch (error) {
            chatHistory.pop(); // Clear bad turn
            glowOrb.style.setProperty('--glow-color', '#f85149'); 
            printToTerminal("[TELEMETRY_CRASH]", `Error Log: ${error.message}`, "system");
        } finally {
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    function simulateContextShift() {
        if (!isIgnited) return;
        if (currentContext === "DESKTOP") {
            currentContext = "VEHICLE";
            contextDisplay.innerText = "VEHICLE COCKPIT ACTIVE";
            contextDisplay.style.color = "#238636";
            printToTerminal("[ENV_SIGNAL]", "Cockpit acoustic profiling enabled. Noise cancellation algorithms engaged for spatial tracking.", "system");
        } else {
            currentContext = "DESKTOP";
            contextDisplay.innerText = "DESKTOP SANCTUARY ACTIVE";
            contextDisplay.style.color = "#a371f7";
            printToTerminal("[ENV_SIGNAL]", "Automotive loop uncoupled. Restoring local workspace environment parameters.", "system");
        }
    }

    function triggerTelephonyMute() {
        if (!isIgnited) return;
        printToTerminal("[HARD_INTERRUPT]", "Telephony interface incoming call detected (RINGING broadcast). Executing hard audio preemption within 10ms.", "system");
        
        glowOrb.classList.remove('pulsing');
        glowOrb.style.backgroundColor = '#21262d'; 
        glowOrb.style.boxShadow = '0 0 5px #30363d';
        
        printToTerminal("JAX", "[Acoustic Pipe Suspended - Enforcing strict background isolation for Commander's call line]", "system");

        setTimeout(() => {
            glowOrb.classList.add('pulsing');
            glowOrb.style.backgroundColor = 'var(--glow-color)';
            glowOrb.style.boxShadow = '0 0 15px var(--glow-color)';
            printToTerminal("[ENV_SIGNAL]", "Telephony state returned to IDLE. Resuming full-duplex companion conversational loop.", "system");
        }, 6000);
    }
</script>
</body>
</html>
